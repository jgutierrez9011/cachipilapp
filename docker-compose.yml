services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatsapp_commerce
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/whatsapp_commerce
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - postgres
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app

volumes:
  pg_data:
